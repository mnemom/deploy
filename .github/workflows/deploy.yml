name: Deploy

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:
    inputs:
      repos:
        description: "Repos to deploy (comma-separated, or 'all')"
        required: true
        default: "all"
        type: string
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      dry-run:
        description: "Dry run — plan + verify only, no actual deploys"
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: deploy-${{ github.event.client_payload.repo || inputs.repos || 'manual' }}-${{ github.event.client_payload.environment || inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Plan: determine what to deploy and where
  # ─────────────────────────────────────────────
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      deploy-smoltbot: ${{ steps.plan.outputs.deploy-smoltbot }}
      deploy-mnemom-api: ${{ steps.plan.outputs.deploy-mnemom-api }}
      deploy-mnemom-reputation: ${{ steps.plan.outputs.deploy-mnemom-reputation }}
      deploy-mnemom-risk: ${{ steps.plan.outputs.deploy-mnemom-risk }}
      deploy-mnemom-prover: ${{ steps.plan.outputs.deploy-mnemom-prover }}
      deploy-mnemom-website: ${{ steps.plan.outputs.deploy-mnemom-website }}
      deploy-hunter: ${{ steps.plan.outputs.deploy-hunter }}
      deploy-arena-simulator: ${{ steps.plan.outputs.deploy-arena-simulator }}
      deploy-aap: ${{ steps.plan.outputs.deploy-aap }}
      deploy-aip: ${{ steps.plan.outputs.deploy-aip }}
      deploy-aip-otel-exporter: ${{ steps.plan.outputs.deploy-aip-otel-exporter }}
      deploy-mnemom-types: ${{ steps.plan.outputs.deploy-mnemom-types }}
      promote: ${{ steps.plan.outputs.promote }}
      source-ref: ${{ steps.plan.outputs.source-ref }}
      source-repo: ${{ steps.plan.outputs.source-repo }}
    steps:
      - name: Determine deployment plan
        id: plan
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REPO="${{ github.event.client_payload.repo }}"
            ENV="${{ github.event.client_payload.environment }}"
            REF="${{ github.event.client_payload.sha }}"
          else
            REPO="${{ inputs.repos }}"
            ENV="${{ inputs.environment }}"
            REF=""
          fi

          if [ -z "$ENV" ]; then
            echo "::error::Environment not specified"
            exit 1
          fi

          # Determine whether to promote to production
          if [ "$ENV" = "production" ]; then
            echo "promote=true" >> "$GITHUB_OUTPUT"
          else
            echo "promote=false" >> "$GITHUB_OUTPUT"
          fi

          echo "source-ref=$REF" >> "$GITHUB_OUTPUT"
          echo "source-repo=$REPO" >> "$GITHUB_OUTPUT"

          # Normalize repo name (strip org prefix)
          normalize() { echo "$1" | sed 's|mnemom/||'; }

          set_deploy() {
            echo "deploy-$1=true" >> "$GITHUB_OUTPUT"
            echo "  → $1"
          }

          echo "Deploy plan (promote=$ENV):"

          if [ "$REPO" = "all" ]; then
            set_deploy "smoltbot"
            set_deploy "mnemom-api"
            set_deploy "mnemom-reputation"
            set_deploy "mnemom-risk"
            set_deploy "mnemom-prover"
            set_deploy "mnemom-website"
            set_deploy "hunter"
            set_deploy "aap"
            set_deploy "aip"
            set_deploy "aip-otel-exporter"
            set_deploy "arena-simulator"
            set_deploy "mnemom-types"
          else
            # Handle comma-separated list or single repo from dispatch
            # Note: unknown repo names are accepted here by design — they simply
            # produce an output that no job matches on, so they get silently skipped.
            for r in $(echo "$REPO" | tr ',' ' '); do
              r=$(normalize "$(echo "$r" | xargs)")
              set_deploy "$r"
            done
          fi

  # ─────────────────────────────────────────────
  # Notify: Deploy started
  # ─────────────────────────────────────────────

  notify-plan:
    name: "Notify: Deploy Started"
    needs: plan
    if: always() && needs.plan.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_EVENT: staging_start
          DEPLOY_SERVICES: ${{ needs.plan.outputs.source-repo }}
          DEPLOY_ENVIRONMENT: ${{ needs.plan.outputs.promote == 'true' && 'production' || 'staging' }}
          DEPLOY_STATUS: pending
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-slack.js

  # ─────────────────────────────────────────────
  # Verify CI: check source repo CI status
  # ─────────────────────────────────────────────

  verify-ci:
    name: "Verify CI"
    needs: plan
    if: needs.plan.outputs.source-repo != '' && needs.plan.outputs.source-ref != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom
      - name: Check source repo CI status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ needs.plan.outputs.source-repo }}
          SOURCE_REF: ${{ needs.plan.outputs.source-ref }}
        run: |
          echo "Checking CI status for $SOURCE_REPO @ $SOURCE_REF"
          # Get the check runs for the commit (may fail if app lacks checks:read)
          RESPONSE=$(gh api repos/mnemom/$SOURCE_REPO/commits/$SOURCE_REF/check-runs 2>&1) || {
            echo "::warning::Could not access check runs for $SOURCE_REPO (app may lack checks:read permission). Skipping CI verification."
            exit 0
          }
          STATUS=$(echo "$RESPONSE" | jq -r '[.check_runs[] | select(.name != "Trigger Deploy" and .name != "Deploy Context") | .conclusion] | if length == 0 then "pass" elif all(. == "success" or . == "skipped" or . == null) then "pass" else "fail" end')
          if [ "$STATUS" != "pass" ]; then
            echo "::warning::CI checks have not all passed for $SOURCE_REPO @ $SOURCE_REF"
            exit 1
          fi
          echo "All CI checks passed"

  # ═══════════════════════════════════════════════
  # STAGING PHASE (auto, no approval)
  # ═══════════════════════════════════════════════

  # ─────────────────────────────────────────────
  # Staging Tier 1 — Services (parallel)
  # ─────────────────────────────────────────────

  staging-gateway:
    name: "staging / gateway"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      working-directory: gateway
      pre-install-command: "cd shared/policy-engine && npm ci && npm run build"
      cache-dependency-path: gateway/package-lock.json
      health-check-url: https://gateway-staging.mnemom.ai/health
    secrets: inherit

  staging-observer:
    name: "staging / observer"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      working-directory: observer
      pre-install-command: "cd shared/policy-engine && npm ci && npm run build"
      cache-dependency-path: observer/package-lock.json
      # observer is a cron worker — no HTTP health check
    secrets: inherit

  staging-api:
    name: "staging / api"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-api == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/mnemom-api
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-api' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      health-check-url: https://api-staging.mnemom.ai/health
    secrets: inherit

  staging-reputation:
    name: "staging / reputation"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-reputation == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/mnemom-reputation
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-reputation' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      working-directory: server
      cache-dependency-path: server/package-lock.json
      health-check-url: https://reputation-staging.mnemom.ai/health
    secrets: inherit

  staging-risk:
    name: "staging / risk"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-risk == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/mnemom-risk
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-risk' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      working-directory: server
      cache-dependency-path: server/package-lock.json
      health-check-url: https://risk-staging.mnemom.ai/health
    secrets: inherit

  staging-prover:
    name: "staging / prover"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-prover == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-modal.yml
    with:
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-prover' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      health-check-url: https://mnemom--mnemom-prover-prover-service.modal.run/health
    secrets: inherit

  # ─────────────────────────────────────────────
  # Staging Tier 2 — Consumers (after services)
  # ─────────────────────────────────────────────

  staging-website:
    name: "staging / website"
    needs: [plan, verify-ci, staging-gateway, staging-observer, staging-api, staging-reputation, staging-risk, staging-prover]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-website == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-netlify.yml
    with:
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-website' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      health-check-url: https://mnemom-staging.netlify.app
    secrets: inherit

  staging-arena-simulator:
    name: "staging / arena-simulator"
    needs: [plan, verify-ci, staging-gateway, staging-api]
    if: >-
      always() &&
      needs.plan.outputs.deploy-arena-simulator == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-trigger-dev.yml
    with:
      repository: mnemom/arena-simulator
      ref: ${{ needs.plan.outputs.source-repo == 'arena-simulator' && needs.plan.outputs.source-ref || 'main' }}
      environment: staging
      # arena-simulator is a cron worker — no HTTP health check
    secrets: inherit

  # ─────────────────────────────────────────────
  # Staging Tier 3 — Package validation (parallel)
  # ─────────────────────────────────────────────

  staging-reputation-publish:
    name: "staging / reputation (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-reputation == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/mnemom-reputation
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-reputation' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: client/typescript
    secrets: inherit

  staging-risk-publish:
    name: "staging / risk (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-risk == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/mnemom-risk
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-risk' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: client/typescript
    secrets: inherit

  staging-types-publish:
    name: "staging / types (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-types == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/mnemom-types
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-types' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: typescript
    secrets: inherit

  staging-aap-publish:
    name: "staging / aap (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aap == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/aap
      ref: ${{ needs.plan.outputs.source-repo == 'aap' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: typescript
    secrets: inherit

  staging-aip-publish:
    name: "staging / aip (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aip == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/aip
      ref: ${{ needs.plan.outputs.source-repo == 'aip' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: packages/typescript
    secrets: inherit

  staging-otel-publish:
    name: "staging / otel (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aip-otel-exporter == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/aip-otel-exporter
      ref: ${{ needs.plan.outputs.source-repo == 'aip-otel-exporter' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: packages/typescript
    secrets: inherit

  staging-policy-engine-publish:
    name: "staging / policy-engine (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: shared/policy-engine
    secrets: inherit

  staging-cli-publish:
    name: "staging / cli (validate publish)"
    needs: [plan, verify-ci]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.verify-ci.result != 'failure' &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/validate-package.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      npm-directory: cli
      pre-install-command: "cd shared/policy-engine && npm ci && npm run build"
    secrets: inherit

  # ─────────────────────────────────────────────
  # Staging Gate
  # ─────────────────────────────────────────────

  staging-complete:
    name: "Staging Complete"
    needs: [verify-ci, staging-gateway, staging-observer, staging-api, staging-reputation, staging-risk, staging-prover, staging-website, staging-arena-simulator, staging-reputation-publish, staging-risk-publish, staging-types-publish, staging-aap-publish, staging-aip-publish, staging-otel-publish, staging-policy-engine-publish, staging-cli-publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Staging Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI Verification | ${{ needs.verify-ci.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| gateway | ${{ needs.staging-gateway.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| observer | ${{ needs.staging-observer.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| api | ${{ needs.staging-api.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| reputation | ${{ needs.staging-reputation.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| risk | ${{ needs.staging-risk.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| prover | ${{ needs.staging-prover.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| website | ${{ needs.staging-website.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| arena-simulator | ${{ needs.staging-arena-simulator.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| reputation (validate publish) | ${{ needs.staging-reputation-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| risk (validate publish) | ${{ needs.staging-risk-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| types (validate publish) | ${{ needs.staging-types-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| aap (validate publish) | ${{ needs.staging-aap-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| aip (validate publish) | ${{ needs.staging-aip-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| otel (validate publish) | ${{ needs.staging-otel-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| policy-engine (validate publish) | ${{ needs.staging-policy-engine-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| cli (validate publish) | ${{ needs.staging-cli-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
      - name: Check for failures
        if: contains(needs.*.result, 'failure')
        run: |
          echo "Staging deployment failed — production will not proceed"
          exit 1

  # ─────────────────────────────────────────────
  # Notify: Staging complete (production approval pending)
  # ─────────────────────────────────────────────

  notify-staging-complete:
    name: "Notify: Staging Complete"
    needs: [plan, staging-complete]
    if: >-
      always() &&
      needs.plan.outputs.promote == 'true' &&
      needs.staging-complete.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_EVENT: production_approval
          DEPLOY_SERVICES: ${{ needs.plan.outputs.source-repo }}
          DEPLOY_ENVIRONMENT: production
          DEPLOY_STATUS: pending
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-slack.js

  # ─────────────────────────────────────────────
  # E2E Tests (run against staging before production)
  # ─────────────────────────────────────────────

  e2e:
    name: "E2E Tests"
    needs: [staging-complete]
    if: needs.staging-complete.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"
      - name: Run E2E tests
        run: node --test tests/e2e/*.test.js
        timeout-minutes: 5
      - name: E2E Results Summary
        if: always()
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tests ran against staging endpoints." >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────
  # Confidence Score (informational, does not gate production)
  # ─────────────────────────────────────────────

  confidence:
    name: "Confidence Score"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.promote == 'true' &&
      needs.staging-complete.result == 'success' &&
      needs.e2e.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom
      - name: Compute confidence score
        env:
          SOURCE_REPO: ${{ needs.plan.outputs.source-repo }}
          SOURCE_REF: ${{ needs.plan.outputs.source-ref }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          DEPLOY_FLAGS: >-
            {
              "smoltbot": ${{ needs.plan.outputs.deploy-smoltbot == 'true' }},
              "mnemom-api": ${{ needs.plan.outputs.deploy-mnemom-api == 'true' }},
              "mnemom-reputation": ${{ needs.plan.outputs.deploy-mnemom-reputation == 'true' }},
              "mnemom-risk": ${{ needs.plan.outputs.deploy-mnemom-risk == 'true' }},
              "mnemom-website": ${{ needs.plan.outputs.deploy-mnemom-website == 'true' }},
              "mnemom-prover": ${{ needs.plan.outputs.deploy-mnemom-prover == 'true' }},
              "hunter": ${{ needs.plan.outputs.deploy-hunter == 'true' }},
              "arena-simulator": ${{ needs.plan.outputs.deploy-arena-simulator == 'true' }}
            }
        run: node scripts/confidence-score.js

  # ─────────────────────────────────────────────
  # Dry Run Summary
  # ─────────────────────────────────────────────

  dry-run-summary:
    name: "Dry Run Summary"
    needs: [plan, verify-ci, confidence]
    if: always() && github.event.inputs.dry-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "No actual deploys were performed." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Plan | ${{ needs.plan.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI Verification | ${{ needs.verify-ci.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Confidence Score | ${{ needs.confidence.result }} |" >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════
  # PRODUCTION PHASE (requires approval)
  # ═══════════════════════════════════════════════

  # ─────────────────────────────────────────────
  # Production Tier 0 — Packages (npm/PyPI only)
  # ─────────────────────────────────────────────

  prod-types:
    name: "prod / mnemom-types (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-types == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/mnemom-types
    secrets: inherit

  prod-aap:
    name: "prod / aap (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aap == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/aap
    secrets: inherit

  prod-aip:
    name: "prod / aip (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aip == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/aip
    secrets: inherit

  prod-otel:
    name: "prod / aip-otel-exporter (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-aip-otel-exporter == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/aip-otel-exporter
      npm-directory: packages/typescript
    secrets: inherit

  prod-policy-engine:
    name: "prod / policy-engine (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/smoltbot
      npm-directory: shared/policy-engine
    secrets: inherit

  prod-reputation-publish:
    name: "prod / reputation (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-reputation == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/mnemom-reputation
      npm-directory: client/typescript
    secrets: inherit

  prod-risk-publish:
    name: "prod / risk (publish)"
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-risk == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/mnemom-risk
      npm-directory: client/typescript
    secrets: inherit

  # ─────────────────────────────────────────────
  # Production Tier 1 — Services (after packages)
  # ─────────────────────────────────────────────

  prod-gateway:
    name: "prod / gateway"
    # deps: @mnemom/agent-integrity-protocol, @mnemom/aip-otel-exporter (npm)
    # policy-engine is file: link, built from source via pre-install-command
    needs: [plan, staging-complete, prod-aip, prod-otel]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker-canary.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      working-directory: gateway
      pre-install-command: "cd shared/policy-engine && npm ci && npm run build"
      cache-dependency-path: gateway/package-lock.json
      health-check-url: https://gateway.mnemom.ai/health
      script-name: smoltbot-gateway
      service-name: gateway
    secrets: inherit

  prod-observer:
    name: "prod / observer"
    # deps: @mnemom/agent-alignment-protocol, @mnemom/aip-otel-exporter (npm)
    # policy-engine is file: link, built from source via pre-install-command
    needs: [plan, staging-complete, prod-aap, prod-otel]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker.yml
    with:
      repository: mnemom/smoltbot
      ref: ${{ needs.plan.outputs.source-repo == 'smoltbot' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      working-directory: observer
      pre-install-command: "cd shared/policy-engine && npm ci && npm run build"
      cache-dependency-path: observer/package-lock.json
      # observer is a cron worker — no HTTP health check
    secrets: inherit

  prod-api:
    name: "prod / api"
    # deps: @mnemom/policy-engine, @mnemom/aap, @mnemom/aip (npm); fault-lines is inlined
    needs: [plan, staging-complete, prod-policy-engine, prod-aap, prod-aip]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-api == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker-canary.yml
    with:
      repository: mnemom/mnemom-api
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-api' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      health-check-url: https://api.mnemom.ai/health
      script-name: mnemom-api
      service-name: api
    secrets: inherit

  prod-reputation:
    name: "prod / reputation"
    # Package published first so version matches the API the Worker serves
    needs: [plan, staging-complete, prod-reputation-publish]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-reputation == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker-canary.yml
    with:
      repository: mnemom/mnemom-reputation
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-reputation' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      working-directory: server
      cache-dependency-path: server/package-lock.json
      health-check-url: https://reputation.mnemom.ai/health
      script-name: mnemom-reputation
      service-name: reputation
    secrets: inherit

  prod-risk:
    name: "prod / risk"
    # deps: @mnemom/types (npm), package published first
    needs: [plan, staging-complete, prod-types, prod-risk-publish]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-risk == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-cloudflare-worker-canary.yml
    with:
      repository: mnemom/mnemom-risk
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-risk' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      working-directory: server
      cache-dependency-path: server/package-lock.json
      health-check-url: https://risk.mnemom.ai/health
      script-name: mnemom-risk
      service-name: risk
    secrets: inherit

  prod-prover:
    name: "prod / prover"
    # pure Rust — no npm package deps
    needs: [plan, staging-complete, e2e]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-prover == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-modal.yml
    with:
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-prover' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      health-check-url: https://mnemom--mnemom-prover-prover-service.modal.run/health
    secrets: inherit

  # ─────────────────────────────────────────────
  # Production Tier 2 — Consumers (after services)
  # ─────────────────────────────────────────────

  prod-website:
    name: "prod / website"
    # runtime HTTP deps: api.mnemom.ai, gateway.mnemom.ai
    # @mnemom/aap (npm) satisfied transitively via prod-api
    needs: [plan, staging-complete, prod-gateway, prod-api]
    if: >-
      always() &&
      needs.plan.outputs.deploy-mnemom-website == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-netlify.yml
    with:
      ref: ${{ needs.plan.outputs.source-repo == 'mnemom-website' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      health-check-url: https://www.mnemom.ai
    secrets: inherit

  prod-cli:
    name: "prod / cli (publish)"
    # runtime HTTP deps: api.mnemom.ai, gateway.mnemom.ai
    # policy-engine is file: link, built from source
    needs: [plan, staging-complete, prod-gateway, prod-api]
    if: >-
      always() &&
      needs.plan.outputs.deploy-smoltbot == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/dispatch-publish.yml
    with:
      repository: mnemom/smoltbot
      npm-directory: cli
    secrets: inherit

  prod-hunter:
    name: "prod / hunter"
    # runtime HTTP deps: gateway.mnemom.ai, api.mnemom.ai
    needs: [plan, staging-complete, prod-gateway, prod-api]
    if: >-
      always() &&
      needs.plan.outputs.deploy-hunter == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-fly.yml
    with:
      repository: mnemom/hunter
      ref: main
      environment: production
    secrets: inherit

  prod-arena-simulator:
    name: "prod / arena-simulator"
    # runtime deps: gateway.mnemom.ai (trace submission), api.mnemom.ai (arena endpoints)
    needs: [plan, staging-complete, prod-gateway, prod-api]
    if: >-
      always() &&
      needs.plan.outputs.deploy-arena-simulator == 'true' &&
      needs.plan.outputs.promote == 'true' &&
      !contains(needs.*.result, 'failure') &&
      github.event.inputs.dry-run != 'true'
    uses: ./.github/workflows/deploy-trigger-dev.yml
    with:
      repository: mnemom/arena-simulator
      ref: ${{ needs.plan.outputs.source-repo == 'arena-simulator' && needs.plan.outputs.source-ref || 'main' }}
      environment: production
      # arena-simulator is a cron worker — no HTTP health check
    secrets: inherit

  # ─────────────────────────────────────────────
  # Summary
  # ─────────────────────────────────────────────

  summary:
    name: Deploy Complete
    if: always() && github.event.inputs.dry-run != 'true'
    needs: [plan, verify-ci, staging-complete, e2e, confidence, dry-run-summary, prod-types, prod-aap, prod-aip, prod-otel, prod-policy-engine, prod-reputation-publish, prod-risk-publish, prod-gateway, prod-observer, prod-api, prod-reputation, prod-risk, prod-prover, prod-website, prod-cli, prod-hunter, prod-arena-simulator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Results
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pre-deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CI Verification | ${{ needs.verify-ci.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Staging" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging Gate | ${{ needs.staging-complete.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.plan.outputs.promote }}" = "true" ]; then
            echo "### Production" >> "$GITHUB_STEP_SUMMARY"
            echo "| Service | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| mnemom-types | ${{ needs.prod-types.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| aap | ${{ needs.prod-aap.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| aip | ${{ needs.prod-aip.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| aip-otel-exporter | ${{ needs.prod-otel.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| policy-engine | ${{ needs.prod-policy-engine.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| reputation (publish) | ${{ needs.prod-reputation-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| risk (publish) | ${{ needs.prod-risk-publish.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| gateway | ${{ needs.prod-gateway.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| observer | ${{ needs.prod-observer.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| api | ${{ needs.prod-api.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| reputation | ${{ needs.prod-reputation.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| risk | ${{ needs.prod-risk.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| prover | ${{ needs.prod-prover.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| website | ${{ needs.prod-website.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| cli | ${{ needs.prod-cli.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| hunter | ${{ needs.prod-hunter.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| arena-simulator | ${{ needs.prod-arena-simulator.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Write audit trail
        if: always()
        run: |
          cat > deployment-audit.jsonl <<JSONL
          {"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","services":"${{ needs.plan.outputs.source-repo }}","environment":"${{ needs.plan.outputs.promote == 'true' && 'production' || 'staging' }}","source_ref":"${{ needs.plan.outputs.source-ref }}","trigger":"${{ github.event_name }}","run_id":"${{ github.run_id }}","conclusion":"${{ contains(needs.*.result, 'failure') && 'failure' || 'success' }}"}
          JSONL
      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deployment-audit
          path: deployment-audit.jsonl
          retention-days: 90
      - name: Check for failures
        if: contains(needs.*.result, 'failure')
        run: |
          echo "One or more deploy jobs failed"
          exit 1

  # ─────────────────────────────────────────────
  # Notify: Deploy complete/failed
  # ─────────────────────────────────────────────

  notify-complete:
    name: "Notify: Deploy Result"
    needs: [plan, summary]
    if: always() && github.event.inputs.dry-run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPLOY_EVENT: ${{ needs.summary.result == 'success' && 'deploy_complete' || 'deploy_failure' }}
          DEPLOY_SERVICES: ${{ needs.plan.outputs.source-repo }}
          DEPLOY_ENVIRONMENT: ${{ needs.plan.outputs.promote == 'true' && 'production' || 'staging' }}
          DEPLOY_STATUS: ${{ needs.summary.result == 'success' && 'success' || 'failure' }}
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/notify-slack.js

name: Dispatch Publish (to source repo)

on:
  workflow_call:
    inputs:
      repository:
        description: "Source repository (e.g. mnemom/mnemom-reputation)"
        required: true
        type: string
      ref:
        description: "Git ref in source repo (used for logging only)"
        required: false
        type: string
        default: "main"
      npm-directory:
        description: "npm-directory to pass through to source repo's publish.yml"
        required: false
        type: string
        default: ""
      access:
        description: "npm publish access level to pass through"
        required: false
        type: string
        default: ""
      publish-pypi:
        description: "Pass through to source repo (not used by dispatch, source repo knows its own config)"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  dispatch:
    name: "Dispatch → ${{ inputs.repository }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v2
        id: app-token
        with:
          app-id: ${{ secrets.DEPLOY_APP_ID }}
          private-key: ${{ secrets.DEPLOY_APP_PRIVATE_KEY }}
          owner: mnemom

      - name: Dispatch and get run ID
        id: dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPO="${{ inputs.repository }}"

          # Build inputs object
          INPUTS='{"dispatch-id":"deploy-${{ github.run_id }}"'
          if [ -n "${{ inputs.npm-directory }}" ]; then
            INPUTS="$INPUTS,\"npm-directory\":\"${{ inputs.npm-directory }}\""
          fi
          if [ -n "${{ inputs.access }}" ]; then
            INPUTS="$INPUTS,\"access\":\"${{ inputs.access }}\""
          fi
          INPUTS="$INPUTS}"

          # Look up the workflow ID for publish.yml
          WORKFLOW_ID=$(gh api "repos/$REPO/actions/workflows" \
            --jq '.workflows[] | select(.path==".github/workflows/publish.yml") | .id')

          if [ -z "$WORKFLOW_ID" ]; then
            echo "::error::Could not find publish.yml workflow in $REPO"
            exit 1
          fi

          echo "Dispatching publish.yml (workflow $WORKFLOW_ID) in $REPO"
          echo "  inputs: $INPUTS"

          # Use the API directly with return_run_details to get the run ID
          RESPONSE=$(gh api \
            "repos/$REPO/actions/workflows/$WORKFLOW_ID/dispatches" \
            -X POST \
            -f ref=main \
            --input - <<< "{\"ref\":\"main\",\"inputs\":$INPUTS,\"return_run_details\":true}")

          RUN_ID=$(echo "$RESPONSE" | jq -r '.workflow_run_id // empty')

          if [ -z "$RUN_ID" ]; then
            echo "::error::Dispatch succeeded but no run ID returned"
            echo "Response: $RESPONSE"
            exit 1
          fi

          echo "Dispatched run: $RUN_ID"
          echo "  → https://github.com/$REPO/actions/runs/$RUN_ID"
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for run to complete
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          REPO="${{ inputs.repository }}"
          RUN_ID="${{ steps.dispatch.outputs.run-id }}"
          echo "Watching run $RUN_ID in $REPO..."
          echo "  → https://github.com/$REPO/actions/runs/$RUN_ID"

          gh run watch "$RUN_ID" \
            --repo "$REPO" \
            --exit-status
